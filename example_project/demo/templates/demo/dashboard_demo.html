{% load static attendance_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #1e293b;
            margin-bottom: 30px;
        }
    </style>
    <link rel="stylesheet" href="{% static 'attendance_calendar/css/dashboard.css' %}">
</head>
<body>
    <div class="container">
        <h1>👥 Team Attendance Dashboard</h1>
        
        {% attendance_dashboard dashboard_data theme="light" columns=3 show_summary=True %}
    </div>
</body>
</html>
